name: CI/CD Pipeline for Travel Planner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # 👈 Yahan pehle node-node-version likha tha, use sahi kiya

      - name: Install & Build Frontend
        run: |
          cd frontend # 👈 Aapke folder ke naam ke mutabik ekdum sahi hai
          npm install
          npm run build

      - name: Install Backend
        run: |
          cd backend
          npm install
